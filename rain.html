<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain</title>
    <link rel="preload" href="audio/explosion.mp3" as="audio">
    <link rel="preload" href="audio/Project_78.mp3" as="audio">
    <link rel="stylesheet" href="./css/rain.css">
</head>
<body>
    <div id="score">Score: 0</div> 
    <p id="current_track_m">CURRENT TRACK:</p>
    <div id="best-score">Best Score: 0</div>
    
    
    <div class="volume_container_thing">
        <span>MUS</span>
        <input class="orange" type="range" id="volume" name="volume" min="0" max="1" step="0.01" value="0.5" onchange="onChangeVol(this.value)">
        <span>SFX</span>
        <input class="orange" type="range" id="sfxvolume" name="sfxvolume" min="0" max="1" step="0.01" value="0.3" onchange="onChangeSFXVol(this.value)">
    </div>
    <button id="home" onclick="onhome()">I wanna go back home now.</button>
    <script src="./javascript/rain.js"></script>
</body>
</html>
